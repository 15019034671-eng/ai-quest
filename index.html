<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI打怪进阶">
<meta name="theme-color" content="#0f0f1a">
<title>⚔️ AI 打怪进阶 · 28天冒险之旅</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --c1: #5ec75e; --c2: #4ecdc4; --c3: #ff8c42; --c4: #b47cd6;
  --gold: #ffb800; --bg: #0f0f1a; --card: #fffef5; --dark: #333;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #e0f0ff 35%, #7ec850 35%, #5da830 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: #333;
}

/* === 顶部条 === */
.topbar {
  position: sticky; top: 10px; z-index: 200;
  max-width: 1200px; margin: 0 auto;
  background: #fffef5;
  border: 4px solid #333;
  border-radius: 22px;
  padding: 12px 20px;
  display: flex; align-items:center; gap:14px;
  flex-wrap: wrap;
  box-shadow: 5px 5px 0 #333;
}
.hero-face {
  width:50px; height:50px; border-radius:50%;
  background:#ffe0bd; border:3px solid #333;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; flex-shrink:0;
}
.hero-info { flex:1; min-width:120px; }
.hero-name { font-size:18px; font-weight:900; }
.hero-title {
  display:inline-block; background:var(--gold); color:#fff;
  font-size:11px; font-weight:700; padding:2px 10px; border-radius:10px;
  border:2px solid #333;
}
.xp-box {
  flex:2; min-width:200px; background:#f0f8e8;
  border:2px solid #333; border-radius:14px; padding:10px 14px;
}
.xp-label { display:flex; justify-content:space-between; font-size:12px; font-weight:700; color:#666; margin-bottom:4px; }
.xp-bar { height:16px; background:#fff; border:2px solid #333; border-radius:8px; overflow:hidden; }
.xp-fill {
  height:100%; border-radius:6px;
  background: repeating-linear-gradient(45deg, #ffd43b, #ffd43b 8px, #fab005 8px, #fab005 16px);
  width:0%; transition:width 0.5s;
}
.coins {
  background:var(--gold); border:2px solid #333; border-radius:18px;
  padding:6px 14px; font-weight:900; font-size:16px; color:#5c3d00;
  white-space:nowrap; box-shadow:2px 2px 0 #333;
}

/* === 主布局 === */
.main { display:flex; gap:18px; padding:16px; max-width:1300px; margin:0 auto; }
.quests { flex:3; }
.side { flex:1; min-width:270px; position:sticky; top:105px; align-self:flex-start; }

/* === 周区块 === */
.week-box {
  background:#fffef5; border:4px solid #333; border-radius:22px;
  padding:16px; margin-bottom:16px;
  box-shadow:5px 5px 0 #333;
}
.week-hd { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.week-ico { font-size:32px; }
.week-name { font-size:19px; font-weight:900; }
.week-sub { font-size:12px; color:#888; }
.week-date { font-size:11px; color:#aaa; margin-left:4px; }
.week-badge {
  margin-left:auto; font-size:12px; font-weight:700;
  padding:3px 10px; border-radius:12px; border:2px solid #333;
}
.badge-ok { background:#c8f7c5; color:#2d7a2a; }
.badge-go { background:#ffe8cc; color:#b8600a; }

/* === 关卡卡片 === */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:8px; }
.card {
  background:#fff; border:3px solid #ddd; border-radius:14px;
  padding:12px; cursor:pointer; transition:all 0.15s;
  box-shadow:2px 2px 0 #ddd;
}
.card:hover { border-color:#333; transform:translate(-1px,-1px); box-shadow:4px 4px 0 #ccc; }
.card.done { border-color:#5ec75e; background:#f0fff0; box-shadow:2px 2px 0 #b8e0b8; }
.card.done .c-num { background:#5ec75e; color:#fff; }
.card.today { border-color:#ffb800; border-width:4px; background:#fffef0; box-shadow:4px 4px 0 #e8c800; animation:wig 3s infinite; }
@keyframes wig { 0%,95%,100%{transform:rotate(0)} 96%{transform:rotate(1deg)} 97%{transform:rotate(-1deg)} 98%{transform:rotate(.5deg)} }

.c-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.c-num {
  width:28px; height:28px; border-radius:50%; border:3px solid #ccc;
  background:#fafafa; display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:900; flex-shrink:0; transition:all 0.2s;
}
.c-name { font-size:13px; font-weight:700; flex:1; line-height:1.3; }
.c-time { font-size:10px; color:#999; background:#f5f5f5; border-radius:6px; padding:2px 6px; white-space:nowrap; }
.c-goal { font-size:11px; color:#888; margin-bottom:2px; }
.c-date { font-size:10px; color:#aaa; }
.c-out { font-size:10px; color:#5ec75e; font-weight:700; }

/* === 详情卡片 === */
.detail {
  background:#fffef5; border:4px solid #333; border-radius:18px;
  padding:18px; margin-bottom:14px; box-shadow:5px 5px 0 #333;
  display:none;
}
.detail.on { display:block; }
.d-day { display:inline-block; background:#333; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:8px; }
.d-title { font-size:18px; font-weight:900; margin:6px 0 2px; }
.d-meta { font-size:12px; color:#888; margin-bottom:10px; }
.d-goal { background:#fff0f0; border:3px solid #e74c3c; border-radius:12px; padding:8px 12px; font-size:13px; font-weight:700; color:#c0392b; margin-bottom:10px; }
.d-prog { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#f0f8e8; border:2px dashed #ccc; border-radius:8px; font-size:11px; color:#888; margin-bottom:8px; }
.d-prog .mbar { flex:1; height:6px; background:#e0e0e0; border-radius:3px; overflow:hidden; }
.d-prog .mfill { height:100%; border-radius:3px; background:linear-gradient(90deg,#ffd43b,#ffb800); width:0%; transition:width 0.3s; }

.d-steps { list-style:none; }
.d-steps li {
  display:flex; gap:8px; align-items:flex-start;
  padding:6px 0; font-size:12px; color:#444; border-bottom:1px dashed #eee;
  cursor:pointer; transition:all 0.15s;
}
.d-steps li:hover { background:#fdfde8; border-radius:4px; padding-left:4px; }
.d-steps li.chk { color:#aaa; text-decoration:line-through; }
.s-box {
  min-width:24px; height:24px; border-radius:50%;
  background:#ffd43b; color:#333; border:2px solid #333;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; flex-shrink:0; transition:all 0.2s;
}
.d-steps li.chk .s-box { background:#5ec75e; border-color:#3a9a3a; color:#fff; }
.s-txt { padding-top:2px; line-height:1.5; }

/* 评分 */
.score-sec {
  margin-top:10px; padding:10px 12px; background:#fffdf0;
  border:2px solid #ffd43b; border-radius:12px; text-align:center;
}
.score-tit { font-size:11px; font-weight:700; color:#888; margin-bottom:4px; }
.stars { display:flex; justify-content:center; gap:4px; }
.star { font-size:28px; cursor:pointer; filter:grayscale(100%); transition:all 0.15s; user-select:none; }
.star:hover { transform:scale(1.15); filter:grayscale(0%); }
.star.on { filter:grayscale(0%); }
.score-lbl { font-size:12px; font-weight:700; color:#b8600a; margin-top:3px; }
.score-lbl .bonus { display:inline-block; background:#ffd43b; color:#333; font-size:10px; font-weight:700; padding:1px 8px; border-radius:6px; margin-left:4px; }

.d-out { margin-top:10px; padding:6px 10px; background:#e8ffe8; border:2px solid #5ec75e; border-radius:8px; font-size:12px; color:#2d7a2a; font-weight:700; }

/* 按钮 */
.btn {
  display:inline-block; padding:10px 20px; border:3px solid #333; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer; color:#fff;
  box-shadow:3px 3px 0 #333; transition:all 0.1s;
  font-family:inherit;
}
.btn:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 #333; }
.btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #333; }
.btn-ok { background:#5ec75e; }
.btn-no { background:#e74c3c; }
.btn-sm { padding:5px 10px; font-size:11px; border-radius:8px; box-shadow:2px 2px 0 #333; }
.btn-gray { background:#bbb; color:#333; }

/* 成就 */
.ach-card {
  background:#fffef5; border:4px solid #333; border-radius:18px;
  padding:14px; margin-bottom:14px; box-shadow:5px 5px 0 #333;
}
.ach-card h3 { font-size:15px; margin-bottom:8px; }
.ach-row { display:flex; flex-wrap:wrap; gap:6px; }
.ach-b {
  width:46px; height:46px; border-radius:12px; border:3px solid #ccc;
  background:#eee; display:flex; align-items:center; justify-content:center;
  font-size:22px; transition:all 0.3s;
}
.ach-b.got { background:#fffde0; border-color:#ffd43b; animation:pop 0.5s ease; }
.ach-b.not { opacity:0.3; filter:grayscale(100%); }
@keyframes pop { 0%{transform:scale(.3)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* Boss */
.overlay {
  position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6); z-index:999;
  display:none; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }
.boss {
  background:#fffef5; border:6px solid #333; border-radius:26px;
  padding:30px; text-align:center; max-width:400px; width:90%;
  box-shadow:8px 8px 0 #333;
  animation:bossPop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes bossPop { 0%{transform:scale(.3) rotate(-10deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
.boss-e { font-size:80px; display:block; animation:bFloat .8s infinite alternate ease-in-out; }
@keyframes bFloat { 0%{transform:translateY(0)} 100%{transform:translateY(-10px)} }
.boss-t { font-size:22px; font-weight:900; margin:6px 0; }
.boss-m { font-size:13px; color:#666; margin-bottom:8px; line-height:1.6; }
.boss-r { font-size:13px; color:#2d7a2a; font-weight:700; margin-bottom:16px; }

/* 响应式 */
@media (max-width:820px) {
  .main { flex-direction:column; gap:10px; padding:10px; }
  .side { position:static; min-width:0; }
  .grid { grid-template-columns:1fr; }
  .topbar { padding:10px 12px; gap:8px; }
  .hero-face { width:40px; height:40px; font-size:24px; }
  .hero-name { font-size:15px; }
  .week-name { font-size:16px; }
  .card { padding:10px; }
  .star { font-size:32px; }
  .btn { padding:12px 18px; font-size:15px; }
}
@media (max-width:400px) {
  .hero-name { font-size:14px; }
  .star { font-size:26px; }
}
</style>
</head>
<body>
<div id="dbg" style="position:fixed;top:5px;left:5px;z-index:9999;background:#333;color:#0f0;font-size:9px;padding:2px 6px;border-radius:4px;font-family:monospace;">⏳ 加载中...</div>

<!-- 顶部 -->
<div class="topbar">
  <div class="hero-face" id="heroFace">🧑‍💼</div>
  <div class="hero-info">

    <div class="xp-label"><span>🗺️ 冒险进度</span><span id="xpText">0 / 28</span></div>

  </div>
  <div class="coins">🪙 <span id="coinCount">0</span></div>
</div>

<!-- 主体 -->
<div class="main">
  <div class="quests" id="quests"></div>
  <div class="side">
    <!-- 详情 -->
    <div class="detail" id="detail">
      <span class="d-day" id="dDay"></span>
      <div class="d-title" id="dTitle"></div>
      <div class="d-meta" id="dMeta"></div>
      <div class="d-goal" id="dGoal"></div>
      <div class="d-prog">
        <span>📋 子任务</span> <span id="dStepN">0/0</span>

    <div style="display:flex;gap:6px;margin-top:6px;">
      <button class="btn btn-sm" onclick="exportProgress()" style="flex:1;background:#4ecdc4;">📤 导出进度</button>
      <button class="btn btn-sm" onclick="importProgress()" style="flex:1;background:#ff8c42;">📥 导入进度</button>
    </div>
    <button class="btn btn-sm btn-gray" onclick="resetAll()" style="width:100%;margin-top:6px;">🔄 重新开始冒险</button>
  </div>
</div>

<!-- Boss 弹窗 -->
<div class="overlay" id="overlay">
  <div class="boss">
    <span class="boss-e" id="bossE"></span>
    <div class="boss-t" id="bossT"></div>
    <div class="boss-m" id="bossM"></div>
    <div class="boss-r" id="bossR"></div>
    <button class="btn btn-ok" onclick="closeBoss()">🎒 领取奖励！</button>
  </div>
</div>

<script>
// ═══════════════ 数据 ═══════════════
const W = [
  { id:1, ico:'🌱', name:'新 手 村', sub:'AI 入门', col:'#5ec75e', boss:{ e:'👾', name:'史莱姆大王', t:'Boss: 新手村的试炼！', m:'你学会了提问、写标题、做详情、做图。AI 已经是你的小帮手啦～', r:'🪙 +100 金币 ｜ 🏅 「初出茅庐」称号' }},
  { id:2, ico:'🌿', name:'电商森林', sub:'AI + 电商实战', col:'#4ecdc4', boss:{ e:'🐗', name:'野猪将军', t:'Boss: 电商丛林的野猪将军！', m:'经过实战洗礼，AI 竞品分析、内容策划、数据诊断已掌握。', r:'🪙 +200 金币 ｜ 🏅 「电商兵法家」称号' }},
  { id:3, ico:'⚡', name:'副业峡谷', sub:'副业方向探索', col:'#ff8c42', boss:{ e:'🐲', name:'双头龙', t:'Boss: 副业迷宫的守卫龙！', m:'五大方向探索完毕，你找到了属于自己的副业之路！', r:'🪙 +300 金币 ｜ 🏅 「副业探险家」称号' }},
  { id:4, ico:'🔥', name:'最终城堡', sub:'习惯固化 + 启动', col:'#b47cd6', boss:{ e:'👑', name:'暗影之王', t:'终极 Boss: 暗影之王！', m:'28天修炼完成！从「AI小白」到「AI电商战神」，冒险才刚开始！', r:'🪙 +500 金币 ｜ 🏆 「AI电商战神」终极称号' }},
];

const D = [
  { w:1, d:1, t:30, title:'注册 AI，让它认识你和你的店', goal:'注册 ChatGPT 或 Kimi，让 AI 了解你是做什么的', out:'1 个 AI 账号 + AI 对你店铺的初步了解',
    ss:[
      '手机或电脑浏览器打开 chatgpt.com → 点「Sign up」→ 用邮箱注册。如果打不开，用备选方案：打开 kimi.moonshot.cn → 手机号注册（国内工具，速度飞快，推荐先用这个）。',
      '注册后，在对话框输入：「你好，我是抖音上一个卖童装的商家。我有 4 个店铺，3 个卖婴儿防水罩衣，1 个卖中大童内裤。请你用最简单的话告诉我，你能在哪些方面帮到我？」',
      '看完回复后，再发一句：「我每天只有大约 30 分钟学用 AI。请你帮我规划一下，作为一个童装店主，我优先该用 AI 做什么？只推荐最实用、马上能用的。」截图保存这两次对话。',
      '最后发一句：「以后我请你帮忙写文案的时候，请记住：我的客户是 25-35 岁的宝妈，产品是婴儿罩衣和儿童内裤，平台是抖音。文案风格要亲切、像宝妈在聊天，不要硬广。」——这是给 AI 建记忆。',
      '今天的目标：注册完了、聊了天、AI 知道了你是做什么的。三件事，Done！'

  { w:1, d:2, t:30, title:'学会问对问题 — 好问题才有好答案', goal:'掌握 3 种提问方式，让 AI 的回答质量翻倍', out:'3 个提问公式卡片 + 你亲自验证过的最佳提示词',
    ss:[
      '对比实验。打开 AI，先随便问一句：「帮我写个童装文案」。看回复——很空、很泛，基本不能用。记住这种挫败感。',
      '用「公式1：给身份+场景」。输入：「你是一个有 5 年经验的抖音童装带货主播。请帮我写一段 30 秒的短视频口播文案，产品是婴儿防水罩衣（吃饭画画不怕弄脏，A类纯棉，29.9元），目标客户是宝妈。语气要真实，像在跟闺蜜推荐东西。」对比刚才的回复——天壤之别！',
      '公式2：给例子。输入：「我想让你模仿一种风格。先看这 3 句：（1）宝宝的贴身保镖！防水防脏，妈妈解放双手（2）A类纯棉内裤，不夹屁屁，透气不闷（3）开学季必备！幼儿园妈妈都在囤。请模仿这种风格，帮我的罩衣写 5 句短文案。」',

  { w:1, d:3, t:30, title:'用 AI 批量写罩衣爆款标题', goal:'为你的罩衣商品生成 10 条不同风格的标题，选 2 条上架', out:'2 条可以直接用在抖音小店的新标题',

      '打开 AI，发这段话（替换方括号里的信息）：「我在抖音卖童装。现有一款产品：【[填入产品信息]】。请帮我写 10 条标题，分 4 种风格：① 痛点型（戳宝妈烦恼）② 功能型（突出防水/纯棉）③ 情绪型（解放双手、带娃更轻松）④ 促销型（划算、囤货）。每条 20-35 字，抖音口语风格。」',
      '从 10 条里圈出 3-4 个你觉得最抓眼球的关键词。比如「防水防脏」「宝妈必囤」「不怕吃饭画画」这些。',

// ═══════════════ 核心 ═══════════════
const K = 'ai_quest_v2';
const START = new Date(); START.setHours(0,0,0,0);

function ld() { try{return JSON.parse(localStorage.getItem(K)||'{}')}catch(e){return{}} }
function sv(p) { localStorage.setItem(K, JSON.stringify(p)); syncSave(); }

// ═══ 多设备实时同步（基于 jsonblob.com 免费云存储）═══
let _syncTimer = null, _blobId = localStorage.getItem('ai_blob_id') || '';

function syncSave() {
  if (!_blobId) return;
  const data = JSON.parse(localStorage.getItem(K) || '{}');
  fetch('https://jsonblob.com/api/jsonBlob/' + _blobId, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).then(r => {
    if (r.ok) { Dbg('💾 已同步 ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})); }
    else if (r.status === 404) { _blobId = ''; localStorage.removeItem('ai_blob_id'); Dbg('⚠️ 需重新配对'); }
  }).catch(() => { Dbg('⚠️ 离线'); });
}

function syncLoad() {
  if (!_blobId) return;
  fetch('https://jsonblob.com/api/jsonBlob/' + _blobId)
    .then(r => {
      if (!r.ok) throw new Error('fail');
      return r.json();
    })
    .then(serverData => {
      if (!serverData || !Object.keys(serverData).length) return;
      const local = JSON.parse(localStorage.getItem(K) || '{}');
      let changed = false;
      for (const k of Object.keys(serverData)) {
        const svT = (serverData[k] && serverData[k].t) || 0;
        const loT = (local[k] && local[k].t) || 0;
        if (svT > loT) { local[k] = serverData[k]; changed = true; }
      }
      if (changed) {
        localStorage.setItem(K, JSON.stringify(local));
        P = ld();
        render();
        if (sel>=0 && E('detail').classList.contains('on')) select(sel);
        Dbg('📥 ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
      } else {
        Dbg('✅ ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
      }
    })
    .catch(() => { Dbg('🔄 等待同步...'); });
}

function startSync() {
  // 如果有已配对的 blobId，直接开始同步
  if (_blobId) {
    syncLoad();
    _syncTimer = setInterval(syncLoad, 3000);
    return;
  }
  // 检查 URL 参数中是否有配对码
  const params = new URLSearchParams(window.location.search);
  const pairCode = params.get('pair');
  if (pairCode) {
    _blobId = pairCode;
    localStorage.setItem('ai_blob_id', _blobId);
    Dbg('🔗 已配对！');
    syncSave(); // 上传本地进度
    syncLoad();
    _syncTimer = setInterval(syncLoad, 3000);
    return;
  }
  // 没有配对：创建新的云端数据桶
  createBlob();
}

function createBlob() {
  const data = JSON.parse(localStorage.getItem(K) || '{}');
  fetch('https://jsonblob.com/api/jsonBlob', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).then(r => {
    const loc = r.headers.get('Location') || '';
    const id = loc.replace('/api/jsonBlob/', '');
    if (id) {
      _blobId = id;
      localStorage.setItem('ai_blob_id', _blobId);
      Dbg('☁️ 云端已创建');
      _syncTimer = setInterval(syncLoad, 3000);
    }
  }).catch(() => { Dbg('⚠️ 创建失败，稍后重试'); });
}

function getPairUrl() {
  if (!_blobId) return window.location.href;
  const url = new URL(window.location.href);
  url.searchParams.set('pair', _blobId);
  return url.toString();
}

function Dbg(msg) {
  const el = document.getElementById('dbg');
  if (el) el.textContent = '🔄 ' + msg;
}
function fmt(d) { const M=d.getMonth()+1, dd=d.getDate(), w=['周日','周一','周二','周三','周四','周五','周六']; return M+'/'+dd+' '+w[d.getDay()]; }
function fms(d) { return (d.getMonth()+1)+'/'+d.getDate(); }
function gd(i) { const d=new Date(START); d.setDate(d.getDate()+i); return d; }

let P = ld(), sel = -1;
const BS = {};

function ok(d) { return !!P['d'+d.d]; }
function gdd(d) { return P['d'+d.d]||null; }
function wkOk(w) { return D.filter(d=>d.w===w).every(d=>ok(d)); }
function tot() { return D.filter(d=>ok(d)).length; }
function cns() { return Object.values(P).reduce((s,p)=>s+(p.c||0),0); }

function tglDay(d) {
  const k = 'd'+d.d;
  if (P[k]) { delete P[k]; }
  else { P[k] = { t:Date.now(), c:d.w*100, sc:0, ss:d.ss.map(()=>false) }; }
  sv(P); P = ld();
}

function tglStep(j) {
  if (sel<0) return;
  const d = D[sel], k = 'd'+d.d;
  if (!P[k]) return;
  P[k].ss[j] = !P[k].ss[j];
  sv(P); P = ld();
  select(sel); render();
}

function setScore(v) {
  if (sel<0) return;
  const d = D[sel], k = 'd'+d.d;
  if (!P[k]) return;
  const old = P[k].sc||0;
  P[k].sc = (old===v) ? 0 : v;
  const mul = {0:1,1:.5,2:.7,3:1,4:1.3,5:1.5};
  P[k].c = Math.round(d.w*100 * (mul[P[k].sc]||1));
  sv(P); P = ld();
  select(sel); render();
}

function boss(wk) {
  if (BS[wk.id]) return;
  if (wkOk(wk.id) && (wk.id===1||wkOk(wk.id-1))) {
    BS[wk.id]=true;
    const b=wk.boss;
    E('bossE').textContent=b.e; E('bossT').textContent=b.t;
    E('bossM').textContent=b.m; E('bossR').textContent=b.r;
    E('overlay').classList.add('show');
  }
}
function closeBoss() { E('overlay').classList.remove('show'); render(); }

function E(id) { return document.getElementById(id); }

function select(i) {
  sel = i;
  const d = D[i], o = ok(d), dd = gdd(d);
  const ss = (dd&&dd.ss) ? dd.ss : d.ss.map(()=>false);
  const sdn = ss.filter(s=>s).length;
  const sc = (dd&&dd.sc)||0;

  E('dDay').textContent = 'Day '+d.d+' · '+fmt(gd(i));
  E('dTitle').textContent = d.title;
  E('dMeta').innerHTML = '⏱ '+d.t+' 分钟 | 第 '+d.w+' 周 | '+(o?'✅ 已完成':'⬜ 待完成')+' | 📋 '+sdn+'/'+d.ss.length;
  E('dGoal').textContent = '🎯 '+d.goal;
  E('dStepN').textContent = sdn+'/'+d.ss.length;
  E('dStepBar').style.width = (d.ss.length?sdn/d.ss.length*100:0)+'%';

  // 渲染步骤
  const ul = E('dSteps'); ul.innerHTML = '';
  d.ss.forEach((s,j) => {
    const li = document.createElement('li');
    if (ss[j]) li.className = 'chk';
    li.innerHTML = '<span class="s-box">'+(ss[j]?'✓':(j+1))+'</span><span class="s-txt">'+s+'</span>';
    li.addEventListener('click', ()=>tglStep(j));
    ul.appendChild(li);
  });

  // 星级
  const starsRow = E('starsRow'); starsRow.innerHTML = '';
  for (let v=1; v<=5; v++) {
    const sp = document.createElement('span');
    sp.className = 'star' + (v<=sc?' on':'');
    sp.textContent = '⭐';
    sp.addEventListener('click', ()=>setScore(v));
    starsRow.appendChild(sp);
  }
  const sec = E('scoreSec'), lbl = E('scoreLbl');
  if (!o) {
    sec.style.opacity='.4'; sec.style.pointerEvents='none';
    lbl.textContent = '⚠️ 先完成任务才能评分';
  } else {
    sec.style.opacity='1'; sec.style.pointerEvents='auto';
    const nm = ['','😤 1星·不太满意','🤔 2星·还需努力','😊 3星·还不错！','🌟 4星·很棒！','🔥 5星·完美！'];
    const bn = ['','金币×0.5','金币×0.7','金币×1.0','金币×1.3','金币×1.5'];
    lbl.innerHTML = sc>0 ? nm[sc]+' <span class="bonus">'+bn[sc]+'</span>' : '👆 点击星星打分（影响金币奖励）';
  }

  E('dOut').textContent = '✅ '+d.out;
  const btn = E('btnToggle');
  btn.textContent = o ? '↩ 取消完成' : '✅ 标记完成！';
  btn.className = 'btn '+(o?'btn-no':'btn-ok');
  E('detail').classList.add('on');
}

function toggleDay() {
  if (sel<0) return;
  const d = D[sel];
  tglDay(d);
  boss(W.find(w=>w.id===d.w));
  render();
  select(sel);
}

function exportProgress() {
  // 优先分享配对链接（自动同步）
  const pairUrl = getPairUrl();
  const msg = _blobId
    ? '🔗 配对链接（在另一台设备打开即可自动同步）：\n\n' + pairUrl + '\n\n💡 也支持手动导入：'
    : '📤 导出进度码：';
  const data = JSON.parse(localStorage.getItem(K) || '{}');
  const code = btoa(encodeURIComponent(JSON.stringify(data)));
  navigator.clipboard.writeText(_blobId ? pairUrl : code).then(() => {
    alert(msg + '\n\n✅ 已复制到剪贴板！');
  }).catch(() => {
    prompt('📋 请手动复制：', _blobId ? pairUrl : code);
  });
}

function importProgress() {
  const code = prompt('📥 粘贴配对链接或进度码：');
  if (!code) return;
  // 如果是配对链接，提取 pair 参数
  if (code.includes('?pair=') || code.includes('&pair=')) {
    const url = new URL(code);
    const pairId = url.searchParams.get('pair');
    if (pairId) {
      _blobId = pairId;
      localStorage.setItem('ai_blob_id', _blobId);
      Dbg('🔗 已配对！');
      syncSave();
      syncLoad();
      if (!_syncTimer) _syncTimer = setInterval(syncLoad, 3000);
      render();
      alert('✅ 已配对成功！现在两台设备会自动同步。\n\n每 3 秒自动检查更新，无需手动操作。');
      return;
    }
  }
  // 否则当作旧版进度码处理
  try {
    const remote = JSON.parse(decodeURIComponent(atob(code)));
    const local = JSON.parse(localStorage.getItem(K) || '{}');
    for (const k of Object.keys(remote)) {
      const rT = (remote[k] && remote[k].t) || 0;
      const lT = (local[k] && local[k].t) || 0;
      if (rT > lT || !(k in local)) { local[k] = remote[k]; }
    }
    localStorage.setItem(K, JSON.stringify(local));
    P = ld();
    syncSave();
    render();
    if (sel>=0 && E('detail').classList.contains('on')) select(sel);
    alert('✅ 导入成功！已合并 ' + Object.keys(remote).length + ' 条记录。');
  } catch(e) {
    alert('❌ 格式无效，请检查是否复制完整。');
  }
}

function resetAll() {
  if (confirm('确定要重置全部进度吗？')) {
    localStorage.removeItem(K); P={};
    Object.keys(BS).forEach(k=>delete BS[k]);
    sel=-1; E('detail').classList.remove('on');
    render();
  }
}

function render() {
  // 英雄状态
  const t = tot(), c = cns();
  let fc, nm, tit;
  if (t===0) { fc='🧑‍💼'; nm='电商新手'; tit='Lv.1 路人'; }
  else if (t<=7) { fc='📖'; nm='AI 学徒'; tit='Lv.'+(1+Math.ceil(t/3)); }
  else if (t<=14) { fc='⚔️'; nm='AI 战士'; tit='Lv.'+(4+Math.ceil((t-7)/3)); }
  else if (t<=21) { fc='🛡️'; nm='AI 骑士'; tit='Lv.'+(6+Math.ceil((t-14)/3)); }
  else if (t<28) { fc='🧙'; nm='AI 大师'; tit='Lv.'+(8+Math.ceil((t-21)/3)); }
  else { fc='👑'; nm='AI 电商战神'; tit='Lv.MAX 满级 🎉'; }
  E('heroFace').textContent=fc; E('heroName').textContent=nm; E('heroTitle').textContent=tit;
  const now = new Date(); now.setHours(0,0,0,0);
  E('xpText').textContent = t+' / 28 · 📅 今天 '+fmt(now);
  E('xpFill').style.width = (t/28*100)+'%';
  E('coinCount').textContent = c;

  // 成就
  const badges = [
    { ico:'📝', tip:'第一句话', f:()=>t>=1 },
    { ico:'📦', tip:'首周通关', f:()=>wkOk(1) },
    { ico:'📊', tip:'电商兵法家', f:()=>wkOk(2) },
    { ico:'🔍', tip:'副业探险家', f:()=>wkOk(3) },
    { ico:'🏆', tip:'完美通关', f:()=>t>=28 },
    { ico:'💎', tip:'金币富翁', f:()=>c>=500 },
    { ico:'🔥', tip:'连击 7 天', f:()=>{
      let st=0,mx=0; D.forEach(d=>{if(ok(d)){st++;mx=Math.max(mx,st);}else st=0;}); return mx>=7;
    }},
    { ico:'⚡', tip:'极速先锋', f:()=>D.filter((d,i)=>ok(d)&&i<7).length>=3 },
  ];
  const row = E('achRow'); row.innerHTML='';
  badges.forEach(b=>{
    const el=document.createElement('div');
    el.className='ach-b '+(b.f()?'got':'not');
    el.setAttribute('title', b.tip);
    el.textContent=b.ico;
    row.appendChild(el);
  });

  // 关卡列表
  const zone = E('quests'); zone.innerHTML='';

  W.forEach(wk=>{
    const box = document.createElement('div'); box.className='week-box';
    const wd = D.filter(d=>d.w===wk.id);
    const dn = wd.filter(d=>ok(d)).length;
    const all = dn===wd.length;
    const wi = D.indexOf(wd[0]), we = D.indexOf(wd[wd.length-1]);
    const dr = fms(gd(wi))+' - '+fms(gd(we));

    box.innerHTML = '<div class="week-hd">'
      +'<span class="week-ico">'+wk.ico+'</span>'
      +'<span class="week-name" style="color:'+wk.col+'">'+wk.name+'</span>'
      +'<span class="week-sub">'+wk.sub+'</span>'
      +'<span class="week-date">📅 '+dr+'</span>'
      +'<span class="week-badge '+(all?'badge-ok':'badge-go')+'">'+(all?'✅ 通关！':'⚔️ '+dn+'/'+wd.length)+'</span>'
      +'</div>';

    const grid = document.createElement('div'); grid.className='grid';
    wd.forEach(d=>{
      const di = D.indexOf(d), o = ok(d), dd = gd(di);
      const today = dd.getTime()===now.getTime();
      const card = document.createElement('div');
      card.className = 'card'+(o?' done':'')+(today?' today':'');
      card.innerHTML = '<div class="c-top">'
        +'<span class="c-num">'+(o?'✓':d.d)+'</span>'
        +'<span class="c-name">'+d.title+'</span>'
        +'<span class="c-time">⏱'+d.t+'分</span>'
        +'</div>'
        +'<div class="c-goal">🎯 '+d.goal+'</div>'
        +'<div class="c-date">📅 '+(today?'🔥 今天':fms(dd))+'</div>'
        +'<div class="c-out">✅ '+d.out+'</div>';
      card.addEventListener('click', ()=>select(di));
      grid.appendChild(card);
    });
    box.appendChild(grid);
    zone.appendChild(box);
  });

  // Boss 检测
  W.forEach(wk=>boss(wk));

  // 刷新详情
  if (sel>=0 && E('detail').classList.contains('on')) select(sel);
}

// 启动
render();
startSync();
document.getElementById('dbg').textContent = '🔄 连接中...';
if (tot()===28) select(0);
</script>
</body>
</html>
